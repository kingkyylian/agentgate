version: 1
mode: enforce
workspace:
  root: "."
  readable:
    - "**"
  writable:
    - "src/**"
    - "tests/**"
    - "docs/**"
  neverRead:
    - ".env"
    - ".env.*"
    - ".ssh/**"
    - ".gnupg/**"
    - "**/*.pem"
    - "**/*.key"
    - "**/*_rsa"
    - "**/id_ed25519"
audit:
  path: ".agentgate/audit.jsonl"
  redactSecrets: true
approval:
  mode: terminal
rules:
  - id: deny-private-key-reads
    effect: deny
    tools: ["fs.read", "mcp.tool", "read_file"]
    paths: [".ssh/**", "**/*.pem", "**/*.key", "**/*_rsa", "**/id_ed25519"]
  - id: ask-medium-shell
    effect: ask
    tools: ["shell.exec"]
    commandRisk:
      min: medium
