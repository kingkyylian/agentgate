version: 1
mode: monitor
workspace:
  root: "."
  readable:
    - "**"
  writable:
    - "src/**"
    - "tests/**"
    - "docs/**"
  neverRead:
    - ".env"
    - ".ssh/**"
    - "**/*.pem"
audit:
  path: ".agentgate/audit.jsonl"
  redactSecrets: true
approval:
  mode: none
rules:
  - id: monitor-private-key-reads
    effect: deny
    tools: ["fs.read", "mcp.tool", "read_file"]
    paths: [".ssh/**", "**/*.pem", "**/id_ed25519"]
