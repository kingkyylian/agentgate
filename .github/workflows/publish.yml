name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    if: ${{ !github.event.release.prerelease && !github.event.release.draft && startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm demo
      - run: pnpm smoke:package
      - run: pnpm smoke:install
      - name: Verify release tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag v$tag_version does not match package.json version $package_version" >&2
            exit 1
          fi
          if npm view "@kingkyylian/agentgate@$package_version" version --json >/dev/null 2>&1; then
            echo "@kingkyylian/agentgate@$package_version already exists on npm" >&2
            exit 1
          fi
      - run: npm publish --access public --provenance
